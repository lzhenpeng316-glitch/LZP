<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCS CLOUD 云平台 2.0 · 作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        #pdf-frame { min-height: calc(100vh - 12rem); }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased min-h-screen flex flex-col">
    <header class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white shadow-lg shrink-0 z-20">
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4 flex flex-wrap items-center gap-4 justify-between">
            <div class="flex items-center gap-4 min-w-0">
                <a href="3.0.html#portfolio-trigger" class="shrink-0 flex items-center gap-2 text-white/90 hover:text-white text-sm font-bold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>
                    返回作品集
                </a>
                <div class="h-6 w-px bg-white/30 hidden sm:block"></div>
                <div class="min-w-0">
                    <h1 class="text-lg md:text-xl font-black tracking-tight truncate">DCS CLOUD · 云平台 2.0</h1>
                    <p class="text-xs md:text-sm text-white/80 font-medium">华大生命科学研究院 BGI-Research · UI / UX</p>
                </div>
            </div>
            <a id="open-tab" href="cloud-platform/01.pdf" target="_blank" rel="noopener" class="shrink-0 text-xs md:text-sm font-bold bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition-colors">
                新标签页打开当前 PDF
            </a>
        </div>
    </header>

    <div class="flex flex-1 flex-col lg:flex-row min-h-0 max-w-7xl w-full mx-auto">
        <aside class="w-full lg:w-64 shrink-0 bg-white border-b lg:border-b-0 lg:border-r border-slate-200 p-4 lg:min-h-0 overflow-x-auto lg:overflow-y-auto">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-2">文档列表</p>
            <nav class="flex lg:flex-col gap-2" id="doc-nav">
                <button type="button" data-pdf="cloud-platform/01.pdf" data-label="文档 1" class="doc-btn text-left px-3 py-2.5 rounded-lg text-sm font-bold bg-emerald-50 text-emerald-800 ring-2 ring-emerald-500 whitespace-nowrap lg:whitespace-normal">文档 1</button>
                <button type="button" data-pdf="cloud-platform/02.pdf" data-label="文档 2" class="doc-btn text-left px-3 py-2.5 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-50 whitespace-nowrap lg:whitespace-normal">文档 2</button>
                <button type="button" data-pdf="cloud-platform/03.pdf" data-label="文档 3" class="doc-btn text-left px-3 py-2.5 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-50 whitespace-nowrap lg:whitespace-normal">文档 3</button>
                <button type="button" data-pdf="cloud-platform/04.pdf" data-label="文档 4" class="doc-btn text-left px-3 py-2.5 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-50 whitespace-nowrap lg:whitespace-normal">文档 4</button>
                <button type="button" data-pdf="cloud-platform/05.pdf" data-label="文档 5" class="doc-btn text-left px-3 py-2.5 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-50 whitespace-nowrap lg:whitespace-normal">文档 5</button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col min-h-0 p-4 md:p-6 bg-slate-200/50">
            <div class="flex-1 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden flex flex-col min-h-[70vh]">
                <div class="px-4 py-2 border-b border-slate-100 flex items-center justify-between gap-2 bg-slate-50/80">
                    <span id="current-label" class="text-sm font-bold text-slate-700 truncate">文档 1</span>
                    <span class="text-[10px] text-slate-400 shrink-0 hidden sm:inline">内嵌预览 · 若无法显示请用右上角「新标签页打开」</span>
                </div>
                <iframe id="pdf-frame" title="PDF 预览" class="w-full flex-1 border-0 bg-slate-100" src="cloud-platform/01.pdf"></iframe>
            </div>
        </main>
    </div>

    <script>
        (function () {
            var frame = document.getElementById('pdf-frame');
            var labelEl = document.getElementById('current-label');
            var openTab = document.getElementById('open-tab');
            var btns = document.querySelectorAll('.doc-btn');
            var active = 'bg-emerald-50 text-emerald-800 ring-2 ring-emerald-500';
            var idle = 'text-slate-600 hover:bg-slate-50';

            function setActive(btn) {
                btns.forEach(function (b) {
                    b.className = 'doc-btn text-left px-3 py-2.5 rounded-lg text-sm font-bold ' + idle + ' whitespace-nowrap lg:whitespace-normal';
                });
                btn.className = 'doc-btn text-left px-3 py-2.5 rounded-lg text-sm font-bold ' + active + ' whitespace-nowrap lg:whitespace-normal';
            }

            btns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var pdf = btn.getAttribute('data-pdf');
                    var label = btn.getAttribute('data-label');
                    frame.src = pdf;
                    labelEl.textContent = label;
                    openTab.href = pdf;
                    setActive(btn);
                });
            });
        })();
    </script>
</body>
</html>
