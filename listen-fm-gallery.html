<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }

<body class="bg-slate-900 text-slate-100 antialiased min-h-screen flex flex-col">
    <header class="bg-gradient-to-r from-slate-800 to-slate-900 border-b border-slate-700 shadow-lg shrink-0 z-20">
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4 flex flex-wrap items-center gap-4 justify-between">
            <div class="flex items-center gap-4 min-w-0">
                <a href="3.0.html#portfolio-trigger" class="shrink-0 flex items-center gap-2 text-slate-300 hover:text-white text-sm font-bold transition-colors">

            <a href="listen-fm/portfolio.pdf" target="_blank" rel="noopener" class="shrink-0 text-xs md:text-sm font-bold bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg transition-colors border border-slate-600">
                新标签页打开 PDF
            </a>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 flex flex-col min-h-0">

            <div class="px-4 py-2 border-b border-slate-700 flex items-center justify-between gap-2 bg-slate-800/90">
                <span class="text-sm font-bold text-slate-300 truncate">作品集 PDF</span>
